name: Deploy Bot

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build  # 👈 сборка происходит в CI до копирования
        run: npm run build

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/bundle.min.js,package.json,package-lock.json"  # 👈 только нужное
          target: ${{ secrets.VPS_PATH }}

      - name: Restart PM2
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            source ~/.nvm/nvm.sh && nvm use 24.7.0
            npm ci --omit=dev
            pm2 restart helper-bot || pm2 start --name "helper-bot" ./dist/bundle.min.js
            pm2 save
